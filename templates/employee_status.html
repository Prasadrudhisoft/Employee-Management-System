<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Employee Management | StaffCores</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --primary-light: #6366f1;
      --primary-lighter: #e0e7ff;
      --primary-subtle: #eef2ff;
      --primary-glow: rgba(79, 70, 229, 0.15);
      --success: #059669;
      --success-light: #ecfdf5;
      --success-border: #a7f3d0;
      --warning: #d97706;
      --warning-light: #fffbeb;
      --danger: #dc2626;
      --danger-light: #fef2f2;
      --danger-border: #fecaca;
      --info: #0284c7;
      --info-light: #f0f9ff;
      --bg-body: #f5f6fa;
      --bg-white: #ffffff;
      --bg-muted: #f1f5f9;
      --border: #e2e8f0;
      --border-light: #f1f5f9;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-muted: #94a3b8;
      --text-placeholder: #cbd5e1;
      --radius-sm: 6px;
      --radius: 8px;
      --radius-md: 10px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-2xl: 20px;
      --radius-full: 9999px;
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-body);
      color: var(--text-secondary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.4);
      border-radius: 10px;
    }

    /* ========== TOPBAR ========== */
    .topbar {
      position: sticky;
      top: 0;
      height: 68px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      z-index: 50;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .topbar-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
      box-shadow: 0 4px 12px var(--primary-glow);
      flex-shrink: 0;
    }

    .topbar-info h1 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .topbar-info span {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 20px;
      background: var(--bg-white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-full);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-decoration: none;
      cursor: pointer;
      transition: all var(--transition-fast);
      white-space: nowrap;
    }

    .btn-back i {
      font-size: 11px;
      transition: transform var(--transition-fast);
    }

    .btn-back:hover {
      background: var(--primary-subtle);
      border-color: var(--primary-lighter);
      color: var(--primary);
    }

    .btn-back:hover i {
      transform: translateX(-3px);
    }

    /* ========== PAGE BODY ========== */
    .page-body {
      padding: 28px 32px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ========== BANNER ========== */
    .page-banner {
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 45%, #818cf8 100%);
      border-radius: var(--radius-2xl);
      padding: 30px 38px;
      margin-bottom: 24px;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .page-banner::before {
      content: '';
      position: absolute;
      top: -60%;
      right: -8%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.09) 0%, transparent 60%);
      pointer-events: none;
    }

    .page-banner .decor-ring {
      position: absolute;
      bottom: -25px;
      right: 160px;
      width: 100px;
      height: 100px;
      border: 2px solid rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      pointer-events: none;
    }

    .banner-inner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .banner-text h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 7px;
      letter-spacing: -0.02em;
    }

    .banner-text p {
      font-size: 13.5px;
      opacity: 0.78;
      max-width: 460px;
      line-height: 1.7;
    }

    .banner-icon {
      width: 68px;
      height: 68px;
      border-radius: var(--radius-xl);
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    /* Stats pills in banner */
    .banner-stats {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: var(--radius-full);
      font-size: 12.5px;
      font-weight: 500;
      color: white;
    }

    .stat-pill .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .dot-green {
      background: #34d399;
      box-shadow: 0 0 6px rgba(52, 211, 153, 0.6);
    }

    .dot-red {
      background: #f87171;
      box-shadow: 0 0 6px rgba(248, 113, 113, 0.6);
    }

    .stat-pill strong {
      font-weight: 700;
    }

    /* ========== FORM CARD (shared) ========== */
    .form-card {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--radius-2xl);
      overflow: hidden;
      margin-bottom: 20px;
    }

    /* ========== SECTION BLOCK ========== */
    .section-block {
      padding: 22px 28px;
      border-bottom: 1px solid var(--border-light);
    }

    .section-block:last-child {
      border-bottom: none;
    }

    .section-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .section-heading-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .section-icon.indigo {
      background: var(--primary-subtle);
      color: var(--primary);
    }

    .section-icon.emerald {
      background: var(--success-light);
      color: var(--success);
    }

    .section-title h3 {
      font-size: 14.5px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .section-title p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ========== CONTROLS ROW ========== */
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border-light);
      background: var(--bg-muted);
    }

    /* Tabs */
    .tab-bar {
      display: flex;
      gap: 4px;
      background: var(--bg-white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 4px;
    }

    .tab-btn {
      padding: 7px 18px;
      border-radius: var(--radius-md);
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .tab-btn.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 2px 8px var(--primary-glow);
    }

    .tab-btn:hover:not(.active) {
      color: var(--text-secondary);
      background: var(--bg-muted);
    }

    /* Search */
    .search-wrap {
      position: relative;
    }

    .search-wrap i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-wrap input {
      width: 260px;
      padding: 9px 14px 9px 34px;
      background: var(--bg-white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      transition: all var(--transition-fast);
    }

    .search-wrap input::placeholder {
      color: var(--text-placeholder);
    }

    .search-wrap input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    /* ========== TABLE ========== */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      border-bottom: 1px solid var(--border-light);
      background: var(--bg-muted);
    }

    thead th {
      padding: 11px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border-light);
      transition: background var(--transition-fast);
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr:hover {
      background: var(--bg-muted);
    }

    tbody td {
      padding: 14px 20px;
      font-size: 13.5px;
      vertical-align: middle;
    }

    /* Avatar cell */
    .avatar-cell {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      color: white;
      flex-shrink: 0;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .emp-name {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .emp-email {
      font-size: 11.5px;
      color: var(--text-muted);
    }

    /* Status badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: var(--radius-full);
      font-size: 11.5px;
      font-weight: 600;
    }

    .badge-active {
      background: var(--success-light);
      color: var(--success);
      border: 1px solid var(--success-border);
    }

    .badge-inactive {
      background: var(--danger-light);
      color: var(--danger);
      border: 1px solid var(--danger-border);
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* Action buttons */
    .toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      border-radius: var(--radius-lg);
      border: 1.5px solid;
      font-family: 'Inter', sans-serif;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
      white-space: nowrap;
    }

    .toggle-btn.enable {
      background: var(--success-light);
      border-color: var(--success-border);
      color: var(--success);
    }

    .toggle-btn.enable:hover {
      background: rgba(5, 150, 105, 0.15);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(5, 150, 105, 0.18);
    }

    .toggle-btn.disable {
      background: var(--danger-light);
      border-color: var(--danger-border);
      color: var(--danger);
    }

    .toggle-btn.disable:hover {
      background: rgba(220, 38, 38, 0.12);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(220, 38, 38, 0.15);
    }

    .toggle-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .spinner {
      width: 11px;
      height: 11px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    .toggle-btn.loading .spinner {
      display: block;
    }

    .toggle-btn.loading .btn-icon {
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ========== EMPTY STATE ========== */
    .empty-state {
      padding: 56px 20px;
      text-align: center;
    }

    .empty-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--primary-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--primary);
      margin: 0 auto 14px;
    }

    .empty-state h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 5px;
    }

    .empty-state p {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ========== SKELETON ========== */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-muted) 25%, var(--border) 50%, var(--bg-muted) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius-sm);
      height: 16px;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0
      }

      100% {
        background-position: -200% 0
      }
    }

    /* ========== TOAST ========== */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 18px;
      border-radius: var(--radius-xl);
      background: var(--text-primary);
      color: white;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.22);
      animation: slideUp .3s cubic-bezier(0.34, 1.56, 0.64, 1);
      min-width: 240px;
      max-width: 340px;
    }

    .toast.success i {
      color: #34d399;
    }

    .toast.error i {
      color: #f87171;
    }

    @keyframes slideUp {
      from {
        transform: translateY(14px);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      .topbar {
        padding: 0 16px;
      }

      .topbar-info span {
        display: none;
      }

      .page-body {
        padding: 16px;
      }

      .page-banner {
        padding: 20px 18px;
      }

      .banner-icon {
        display: none;
      }

      .controls-row {
        flex-direction: column;
        align-items: stretch;
      }

      .search-wrap input {
        width: 100%;
      }

      thead th:nth-child(3) {
        display: none;
      }

      tbody td:nth-child(3) {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .topbar {
        height: 60px;
      }

      .btn-back-label {
        display: none;
      }

      thead th:nth-child(2) {
        display: none;
      }

      tbody td:nth-child(2) {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- ========== TOPBAR ========== -->
  <header class="topbar">
    <a href="/managerdashboard" class="btn-back">
      <i class="fas fa-arrow-left"></i>
      <span class="btn-back-label">Back to Dashboard</span>
    </a>
    <div class="topbar-left">
      <div class="topbar-info" style="text-align:right">
        <h1>Employee Management</h1>
        <span>StaffCores &nbsp;·&nbsp; Manager Panel</span>
      </div>
      <div class="topbar-icon"><i class="fas fa-users"></i></div>
    </div>
  </header>

  <!-- ========== PAGE BODY ========== -->
  <div class="page-body">

    <!-- Banner -->
    <div class="page-banner">
      <div class="decor-ring"></div>
      <div class="banner-inner">
        <div class="banner-text">
          <h2>Manage Employees</h2>
          <p>View, search, and control employee account access across your organisation.</p>
          <div class="banner-stats">
            <div class="stat-pill">
              <span class="dot dot-green"></span>
              Active: <strong id="count-active">—</strong>
            </div>
            <div class="stat-pill">
              <span class="dot dot-red"></span>
              Inactive: <strong id="count-inactive">—</strong>
            </div>
          </div>
        </div>
        <div class="banner-icon"><i class="fas fa-users"></i></div>
      </div>
    </div>

    <!-- Main Card -->
    <div class="form-card">

      <!-- Controls row -->
      <div class="controls-row">
        <div class="tab-bar">
          <button class="tab-btn active" onclick="switchTab('active', this)">
            <i class="fas fa-circle-check" style="font-size:11px;margin-right:5px"></i>Active
          </button>
          <button class="tab-btn" onclick="switchTab('inactive', this)">
            <i class="fas fa-ban" style="font-size:11px;margin-right:5px"></i>Deactivated
          </button>
          <button class="tab-btn" onclick="switchTab('all', this)">
            <i class="fas fa-users" style="font-size:11px;margin-right:5px"></i>All
          </button>
        </div>
        <div class="search-wrap">
          <i class="fas fa-search"></i>
          <input type="text" id="search-input" placeholder="Search by name or email…" oninput="renderTable()">
        </div>
      </div>

      <!-- Section heading -->
      <div class="section-block">
        <div class="section-heading">
          <div class="section-heading-left">
            <div class="section-icon indigo"><i class="fas fa-users"></i></div>
            <div class="section-title">
              <h3>Employee Directory</h3>
              <p id="table-count">Loading employees…</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table id="emp-table">
          <thead>
            <tr>
              <th>Employee</th>
              <th>Department</th>
              <th>Joined</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr>
              <td colspan="5">
                <div class="skeleton" style="margin:18px 20px;width:55%"></div>
              </td>
            </tr>
            <tr>
              <td colspan="5">
                <div class="skeleton" style="margin:18px 20px;width:72%"></div>
              </td>
            </tr>
            <tr>
              <td colspan="5">
                <div class="skeleton" style="margin:18px 20px;width:48%"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div><!-- /form-card -->

  </div><!-- /page-body -->

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>
 <script src="/static/js/config.js"></script>
  <script>
    'use strict';


    const TOKEN = localStorage.getItem('token') || '';
    const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` };

    let allEmployees = [];
    let currentTab = 'active';

    /* ── Load employees ── */
    async function loadEmployees() {
      try {
        const res = await fetch(`${API_BASE}/get_emp`, { headers });
        const data = await res.json();
        if (data.status !== 'success') { showToast(data.message, 'error'); return; }

        const normalize = (e, forcedStatus) => ({
          ...e,
          id: e.id,
          name: e.Name || e.name || '',
          email: e.Email || e.email || '',
          status: forcedStatus,
          contact: e.Contact || e.contact || '',
          profile_img: e.Profile_img || e.profile_img || '',
          department_id: e.department_id || '',
          join_date: e.join_date || '',
        });

        const active = (data.active_users || []).map(e => normalize(e, 'Active'));
        const inactive = (data.deactive_users || []).map(e => normalize(e, 'Deactive'));
        allEmployees = [...active, ...inactive];

        document.getElementById('count-active').textContent = active.length;
        document.getElementById('count-inactive').textContent = inactive.length;

        renderTable();
      } catch (e) {
        showToast('Failed to load employees', 'error');
      }
    }

    /* ── Render table ── */
    function renderTable() {
      const query = document.getElementById('search-input').value.toLowerCase();
      const tbody = document.getElementById('table-body');
      const counter = document.getElementById('table-count');

      const filtered = allEmployees.filter(emp => {
        if (currentTab === 'active' && emp.status !== 'Active') return false;
        if (currentTab === 'inactive' && emp.status !== 'Deactive') return false;
        if (query) {
          const inName = (emp.name || '').toLowerCase().includes(query);
          const inEmail = (emp.email || '').toLowerCase().includes(query);
          if (!inName && !inEmail) return false;
        }
        return true;
      });

      counter.textContent = `${filtered.length} employee${filtered.length !== 1 ? 's' : ''}`;

      if (!filtered.length) {
        tbody.innerHTML = `
      <tr><td colspan="5">
        <div class="empty-state">
          <div class="empty-icon"><i class="fas fa-users"></i></div>
          <h3>No employees found</h3>
          <p>${query ? 'Try a different search term.' : 'No employees in this category yet.'}</p>
        </div>
      </td></tr>`;
        return;
      }

      const fmt = d => d ? new Date(d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) : '—';

      tbody.innerHTML = filtered.map(emp => {
        const isActive = emp.status === 'Active';
        const initials = (emp.name || 'U').split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        const avatarHtml = emp.profile_img
          ? `<img src="/${emp.profile_img}" alt="${emp.name}" onerror="this.style.display='none'">`
          : initials;

        return `
      <tr id="row-${emp.id}">
        <td>
          <div class="avatar-cell">
            <div class="avatar">${avatarHtml}</div>
            <div>
              <div class="emp-name">${emp.name || '—'}</div>
              <div class="emp-email">${emp.email || '—'}</div>
            </div>
          </div>
        </td>
        <td style="color:var(--text-secondary)">${emp.department_id || '—'}</td>
        <td style="color:var(--text-muted)">${fmt(emp.join_date)}</td>
        <td>
          <span class="badge ${isActive ? 'badge-active' : 'badge-inactive'}">
            <span class="badge-dot"></span>
            ${isActive ? 'Active' : 'Inactive'}
          </span>
        </td>
        <td>
          <button
            class="toggle-btn ${isActive ? 'disable' : 'enable'}"
            id="btn-${emp.id}"
            onclick="toggleStatus('${emp.id}', '${emp.status}')">
            <span class="btn-icon">
              <i class="fas ${isActive ? 'fa-ban' : 'fa-circle-check'}"></i>
              ${isActive ? 'Disable' : 'Enable'}
            </span>
            <span class="spinner"></span>
          </button>
        </td>
      </tr>`;
      }).join('');
    }

    /* ── Toggle status ── */
    async function toggleStatus(userId, currentStatus) {
      const btn = document.getElementById(`btn-${userId}`);
      btn.disabled = true; btn.classList.add('loading');
      try {
        const res = await fetch(`${API_BASE}/toggle_emp_status`, {
          method: 'POST', headers,
          body: JSON.stringify({ user_id: userId })
        });
        const data = await res.json();
        if (data.status !== 'success') {
          showToast(data.message || 'Update failed', 'error');
          btn.disabled = false; btn.classList.remove('loading'); return;
        }
        const emp = allEmployees.find(e => e.id === userId);
        if (emp) emp.status = data.new_status;
        document.getElementById('count-active').textContent = allEmployees.filter(e => e.status === 'Active').length;
        document.getElementById('count-inactive').textContent = allEmployees.filter(e => e.status === 'Deactive').length;
        showToast(data.message, 'success');
        renderTable();
      } catch (e) {
        showToast('Network error — please try again', 'error');
        btn.disabled = false; btn.classList.remove('loading');
      }
    }

    /* ── Tab switching ── */
    function switchTab(tab, el) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('search-input').value = '';
      renderTable();
    }

    /* ── Toast ── */
    function showToast(msg, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'triangle-exclamation'}"></i>${msg}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    /* ── Init ── */
    window.addEventListener('load', () => {
      if (!localStorage.getItem('token')) { window.location.href = '/'; return; }
      loadEmployees();
    });
  </script>
</body>

</html>
